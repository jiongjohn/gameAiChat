# AI Companion Chat - nginx reverse proxy
#
# Install:
#   sudo cp deploy/nginx.conf         /etc/nginx/sites-available/ai_chat
#   sudo cp deploy/nginx-upgrade-map.conf /etc/nginx/conf.d/upgrade-map.conf
#   sudo ln -sf /etc/nginx/sites-available/ai_chat /etc/nginx/sites-enabled/ai_chat
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Assumptions:
#   - App runs on 127.0.0.1:3000 (pm2 process "ai_chat", `npm start`)
#   - App code + data live under /opt/ai_chat
#   - Generated image assets are stored at /opt/ai_chat/.data/assets/<key>
#
# The $connection_upgrade variable is defined in nginx-upgrade-map.conf.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 20M;

    # Public static serving of generated image assets.
    # The app emits image URLs like /api/assets/<key>.<ext>; the files exist on
    # disk under /opt/ai_chat/.data/assets/. Serving them directly from nginx
    # bypasses the Node session-auth gate so <img> tags render without a cookie.
    # If a referenced file is missing, fall back to the Node route.
    #
    # NOTE: this makes generated images PUBLICLY accessible by URL (keys are
    # random 40-hex hashes, unguessable). If you need per-user private images,
    # remove this block and let the Node route (/api/assets/[key]) handle auth.
    location /api/assets/ {
        alias /opt/ai_chat/.data/assets/;
        try_files $uri @assets_fallback;
        types {
            image/png png;
            image/jpeg jpg jpeg;
            image/webp webp;
            image/svg+xml svg;
            image/gif gif;
        }
        default_type application/octet-stream;
        add_header X-Content-Type-Options nosniff;
        add_header Cache-Control 'public, max-age=31536000, immutable';
        access_log off;
    }

    location @assets_fallback {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / streaming chat: disable buffering, extend timeouts.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
