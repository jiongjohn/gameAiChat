services:
  postgres:
    image: postgres:15-alpine
    container_name: aichat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aichat
      POSTGRES_PASSWORD: aichat
      POSTGRES_DB: aichat
    ports:
      - "5432:5432"
    volumes:
      - aichat-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aichat -d aichat"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  aichat-pg-data:
